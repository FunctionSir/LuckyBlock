<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyBlock · 链上幸运彩票</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: 2rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }
    .card h3 {
      margin-bottom: 12px;
      color: #ffd200;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
      min-width: 140px;
    }
    .stat .label { font-size: 0.75rem; color: #888; }
    .stat .value { font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 4px; }
    button {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    button.secondary { background: rgba(255,255,255,0.15); color: #e0e0e0; }
    input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #ffd200; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-test { background: #e67e22; color: #fff; }
    .badge-vrf { background: #2ecc71; color: #fff; }
    .badge-paused { background: #e74c3c; color: #fff; }
    .log {
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
    }
    .log .entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log .entry.win { color: #2ecc71; }
    .log .entry.buy { color: #3498db; }
    .log .entry.draw { color: #f7971e; }
    .hidden { display: none !important; }
    .divider { border-top: 1px solid rgba(255,255,255,0.1); margin: 16px 0; }
    .note { font-size: 0.75rem; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>LuckyBlock · 链上幸运彩票</h1>

  <div class="card">
    <div class="row">
      <button id="btnConnect" onclick="connectWallet()">连接 MetaMask</button>
      <span id="accountInfo" style="font-size:0.85rem; color:#888;"></span>
      <span id="networkBadge"></span>
    </div>
  </div>

  <div class="card">
    <h3>当前状态 <span id="modeBadge"></span></h3>
    <div class="row" id="stats">
      <div class="stat"><div class="label">当前期数</div><div class="value" id="round">-</div></div>
      <div class="stat"><div class="label">参与者</div><div class="value" id="playersCnt">-</div></div>
      <div class="stat"><div class="label">奖池 (ETH)</div><div class="value" id="prizePool">-</div></div>
      <div class="stat"><div class="label">票价 (ETH)</div><div class="value" id="ticketPrice">-</div></div>
    </div>
    <div style="margin-top:12px;">
      <button id="btnBuy" onclick="buyTicket()">购买彩票</button>
    </div>
  </div>

  <div class="card hidden" id="adminPanel">
    <h3>管理员面板</h3>

    <div class="row" style="margin-bottom:12px;">
      <div class="stat"><div class="label">平台费余额 (ETH)</div><div class="value" id="platformBalance">-</div></div>
      <div class="stat"><div class="label">当前轮次平台费 (ETH)</div><div class="value" id="roundFee">-</div></div>
    </div>

    <div style="margin-bottom:12px;">
      <div style="font-size:0.85rem; margin-bottom:6px; color:#888;">开奖操作</div>
      <div class="row">
        <button id="btnRequestDraw" onclick="requestDraw()">请求 Chainlink 开奖</button>
        <button id="btnDrawForTest" onclick="drawWinner()">VM 测试开奖</button>
        <input type="number" id="randomInput" placeholder="随机数 (测试模式)" style="width:160px; flex:none;" value="12345">
      </div>
      <div class="note" id="drawNote"></div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <button class="secondary" onclick="withdrawFee()">提取平台费</button>
      <button id="btnPause" class="danger" onclick="togglePause()">暂停</button>
    </div>

    <div class="divider"></div>

    <div class="row">
      <input type="text" id="managerAddr" placeholder="管理员地址" style="flex:1;">
      <button class="secondary" onclick="addManager()">添加管理员</button>
      <button class="secondary" onclick="removeManager()">移除管理员</button>
    </div>
  </div>

  <div class="card">
    <h3>事件日志</h3>
    <div class="log" id="eventLog">
      <div class="entry">等待事件...</div>
    </div>
  </div>
</div>

<script>
  const ABI = [
    "function isManager(address) view returns (bool)",
    "function managersCnt() view returns (uint256)",
    "function platformFeeReceiver() view returns (address)",
    "function platformBalance() view returns (uint256)",
    "function roundFee() view returns (uint256)",
    "function feeRate() view returns (uint256)",
    "function roundSales() view returns (uint256)",
    "function curRound() view returns (uint256)",
    "function paused() view returns (bool)",
    "function ticketPrice() view returns (uint256)",
    "function testMode() view returns (bool)",
    "function s_lastRequestId() view returns (uint256)",
    "function pendingDraws(uint256) view returns (bool)",
    "function tickets(uint256) view returns (address)",
    "function getPlayersCount() view returns (uint256)",
    "function getRound() view returns (uint256)",
    "function getBalance() view returns (uint256)",
    "function getRoundFee() view returns (uint256)",
    "function getPlatformBalance() view returns (uint256)",
    "function getTicketPrice() view returns (uint256)",
    "function getPlayers() view returns (address[])",
    "function isPaused() view returns (bool)",
    "function buyTicket() payable",
    "function requestDraw()",
    "function drawWinner(uint256)",
    "function withdrawFee()",
    "function pause()",
    "function unpause()",
    "function addManager(address)",
    "function removeManager(address)",
    "event TicketPurchased(address indexed buyer, uint256 round)",
    "event DrawRequested(uint256 indexed requestId, uint256 round)",
    "event WinnerSelected(address indexed winner, uint256 prize, uint256 round)",
    "event PlatformFeeWithdrawn(uint256 amount)"
  ];

  const CONTRACT_ADDRESS = '0x_YOUR_DEPLOYED_ADDRESS_HERE';

  let provider, signer, contract, account;

  async function connectWallet() {
    if (!window.ethereum) return alert('请安装 MetaMask!');
    provider = new ethers.BrowserProvider(window.ethereum);
    const accounts = await provider.send('eth_requestAccounts', []);
    account = accounts[0];
    signer = await provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    document.getElementById('accountInfo').textContent =
      '已连接: ' + account.slice(0,6) + '...' + account.slice(-4);

    const net = await provider.getNetwork();
    const netName = net.chainId === 11155111n ? 'Sepolia' :
                    net.chainId === 1n ? 'Ethereum' :
                    net.chainId === 31337n ? 'Localhost' :
                    'Chain ' + net.chainId;
    document.getElementById('networkBadge').innerHTML =
      '<span class="badge ' + (net.chainId === 11155111n ? 'badge-vrf' : 'badge-test') + '">' + netName + '</span>';

    await refreshAll();
    setupEvents();

    window.ethereum.on('accountsChanged', () => location.reload());
    window.ethereum.on('chainChanged', () => location.reload());
  }

  async function refreshAll() {
    if (!contract) return;
    const c = contract;

    const [round, cnt, pool, price, paused, testMode, isMgr] = await Promise.all([
      c.getRound(), c.getPlayersCount(), c.getBalance(),
      c.getTicketPrice().catch(() => 0n), c.isPaused(), c.testMode(),
      c.isManager(account)
    ]);

    document.getElementById('round').textContent = round.toString();
    document.getElementById('playersCnt').textContent = cnt.toString();
    document.getElementById('prizePool').textContent = ethers.formatEther(pool);
    document.getElementById('ticketPrice').textContent = ethers.formatEther(price);

    const modeBadge = document.getElementById('modeBadge');
    modeBadge.innerHTML = testMode
      ? '<span class="badge badge-test">VM 测试模式</span>'
      : '<span class="badge badge-vrf">Chainlink VRF</span>';
    if (paused) modeBadge.innerHTML += ' <span class="badge badge-paused">已暂停</span>';

    document.getElementById('btnBuy').disabled = paused;

    if (isMgr) {
      document.getElementById('adminPanel').classList.remove('hidden');
      const [pb, rf] = await Promise.all([
        c.getPlatformBalance(), c.getRoundFee()
      ]);
      document.getElementById('platformBalance').textContent = ethers.formatEther(pb);
      document.getElementById('roundFee').textContent = ethers.formatEther(rf);

      document.getElementById('btnRequestDraw').disabled = testMode;
      document.getElementById('btnDrawForTest').disabled = !testMode;
      document.getElementById('drawNote').textContent = testMode
        ? '当前为 VM 测试模式，使用 "VM 测试开奖" 按钮'
        : '当前为 Chainlink VRF 模式，调用 requestDraw 后等待 Chainlink 回调';
      document.getElementById('btnPause').textContent = paused ? '恢复' : '暂停';
    } else {
      document.getElementById('adminPanel').classList.add('hidden');
    }
  }

  async function buyTicket() {
    if (!contract) return alert('请先连接钱包');
    try {
      const price = await contract.getTicketPrice();
      const tx = await contract.buyTicket({ value: price });
      addLog('buy', '交易已发送: ' + tx.hash.slice(0,10) + '...');
      await tx.wait();
      addLog('buy', '购买成功!');
      await refreshAll();
    } catch (e) {
      addLog('buy', '失败: ' + (e.reason || e.message));
    }
  }

  async function requestDraw() {
    if (!contract) return;
    try {
      const tx = await contract.requestDraw();
      addLog('draw', 'VRF 请求已发送: ' + tx.hash.slice(0,10) + '...');
      await tx.wait();
      addLog('draw', '等待 Chainlink 回调...');
    } catch (e) {
      addLog('draw', '失败: ' + (e.reason || e.message));
    }
  }

  async function drawWinner() {
    if (!contract) return;
    const val = document.getElementById('randomInput').value;
    if (!val) return alert('请输入随机数');
    try {
      const tx = await contract.drawWinner(BigInt(val));
      addLog('draw', '交易已发送: ' + tx.hash.slice(0,10) + '...');
      await tx.wait();
      addLog('draw', '开奖完成!');
      await refreshAll();
    } catch (e) {
      addLog('draw', '失败: ' + (e.reason || e.message));
    }
  }

  async function withdrawFee() {
    try {
      const tx = await contract.withdrawFee();
      await tx.wait();
      addLog('win', '平台费已提取');
      await refreshAll();
    } catch (e) { addLog('win', '失败: ' + (e.reason || e.message)); }
  }

  async function togglePause() {
    try {
      const paused = await contract.isPaused();
      const tx = paused ? await contract.unpause() : await contract.pause();
      await tx.wait();
      addLog('draw', paused ? '已恢复' : '已暂停');
      await refreshAll();
    } catch (e) { addLog('draw', '失败: ' + (e.reason || e.message)); }
  }

  async function addManager() {
    const addr = document.getElementById('managerAddr').value;
    if (!ethers.isAddress(addr)) return alert('无效地址');
    try {
      const tx = await contract.addManager(addr);
      await tx.wait();
      addLog('draw', '已添加管理员: ' + addr.slice(0,6) + '...');
    } catch (e) { addLog('draw', '失败: ' + (e.reason || e.message)); }
  }

  async function removeManager() {
    const addr = document.getElementById('managerAddr').value;
    if (!ethers.isAddress(addr)) return alert('无效地址');
    try {
      const tx = await contract.removeManager(addr);
      await tx.wait();
      addLog('draw', '已移除管理员: ' + addr.slice(0,6) + '...');
    } catch (e) { addLog('draw', '失败: ' + (e.reason || e.message)); }
  }

  function setupEvents() {
    contract.on('TicketPurchased', (buyer, round) => {
      addLog('buy', `[Round ${round}] ${buyer.slice(0,6)}...${buyer.slice(-4)} 购票`);
      refreshAll();
    });
    contract.on('DrawRequested', (requestId, round) => {
      addLog('draw', `[Round ${round}] VRF 请求 ID: ${requestId}`);
    });
    contract.on('WinnerSelected', (winner, prize, round) => {
      addLog('win', `[Round ${round}] 中奖者: ${winner.slice(0,6)}...${winner.slice(-4)} | 奖金: ${ethers.formatEther(prize)} ETH`);
      refreshAll();
    });
    contract.on('PlatformFeeWithdrawn', (amount) => {
      addLog('win', `平台费提取: ${ethers.formatEther(amount)} ETH`);
    });
  }

  function addLog(type, msg) {
    const log = document.getElementById('eventLog');
    const time = new Date().toLocaleTimeString();
    log.innerHTML += `<div class="entry ${type}">[${time}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  }

  window.addEventListener('load', async () => {
    if (window.ethereum) {
      try {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0) await connectWallet();
      } catch (_) {}
    }
  });
</script>
</body>
</html>
